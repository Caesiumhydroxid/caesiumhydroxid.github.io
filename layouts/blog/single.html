{{ define "main" }}
{{ $postImage := index .Params "post-image" }}
{{ $postVideo := index .Params "post-video" }}

<section class="hero is-fullheight has-text-centered" id="hero"{{ if $postVideo }} style="--background-image:url({{ $postImage }});"{{ else }} style="background-image: linear-gradient(0deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.2) 100%), url({{ $postImage }}); background-position: center; background-size: cover; background-repeat: no-repeat;"{{ end }}>
  {{ if $postVideo }}
  <video playsinline autoplay muted loop poster="{{ $postImage }}" id="video">
    <source src="{{ $postVideo }}" type="video/webm">
  </video>
  {{ end }}
  <div class="hero-body">
    <div class="container">
      <h1 class="title has-text-white is-size-1 is-uppercase has-text-weight-bold">{{ .Title }}</h1>
      {{ with .Params.description }}
      <h3 class="subtitle has-text-white-bis is-uppercase has-text-weight-medium is-marginless">{{ . }}</h3>
      {{ end }}
      <hr>
    </div>
  </div>
</section>

<section class="hero is-fullheight has-text-centered" id="post">
  <div class="hero-body">
    <div class="container">
      <div class="content has-text-justified-desktop has-text-justified-fullhd has-text-justified has-text-justified-tablet has-text-left-mobile">
        {{ .Content }}
      </div>
    </div>
  </div>
</section>

<script>
  (function () {
    var hero = document.getElementById('hero');
    var post = document.getElementById('post');
    if (!hero || !post) return;

    var snapLock = false;
    var snapConsumed = false;
    var touchStartY = 0;
    var touchStartTop = 0;
    var touchActive = false;

    function getScrollTop() {
      return Math.max(
        typeof window.scrollY === 'number' ? window.scrollY : 0,
        document.documentElement ? document.documentElement.scrollTop : 0,
        document.body ? document.body.scrollTop : 0
      );
    }

    function triggerPostSnap() {
      if (snapLock || snapConsumed) return false;
      if (getScrollTop() > 8) return false;

      snapLock = true;
      snapConsumed = true;
      post.scrollIntoView({ behavior: 'smooth', block: 'start' });

      window.setTimeout(function () {
        snapLock = false;
      }, 480);
      return true;
    }

    window.addEventListener('wheel', function (event) {
      if (window.innerWidth < 769) return;
      if (event.deltaY <= 0) return;
      if (snapLock || snapConsumed) return;
      if (getScrollTop() > 8) return;

      event.preventDefault();
      triggerPostSnap();
    }, { passive: false });

    window.addEventListener('touchstart', function (event) {
      if (!event.touches || event.touches.length !== 1) return;
      touchActive = true;
      touchStartY = event.touches[0].clientY;
      touchStartTop = getScrollTop();
    }, { passive: true });

    window.addEventListener('touchend', function (event) {
      if (!touchActive) return;
      touchActive = false;

      var endY = touchStartY;
      if (event.changedTouches && event.changedTouches.length) {
        endY = event.changedTouches[0].clientY;
      }

      var swipe = touchStartY - endY;
      if (swipe > 18 && touchStartTop <= 8) {
        triggerPostSnap();
      }
    }, { passive: true });

    window.addEventListener('scroll', function () {
      if (getScrollTop() <= 2) {
        snapConsumed = false;
      }
    }, { passive: true });
  })();
</script>

{{ end }}
