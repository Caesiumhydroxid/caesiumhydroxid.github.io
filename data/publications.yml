  - title: "Stimulated Raman scattering in GaP, Si and Ge nanostructures"
    authors: "Bodingbauer, Jonas"
    venue: "Bachelor Thesis, TU Wien"
    type: "Bachelor Thesis"
    year: 2022
    abstract: "Within the framework of this thesis, the Raman scattering behavior of Gallium phosphide (GaP), Silicon (Si) and Germanium (Ge) nanostructures was experimentally examined. A confocal microscope with backscattering setup and a laser used as pumping light source with a wavelength of 532 nm were used to show Stimulated Raman scattering (SRS) on several samples. Furthermore, the temperature dependence of the Raman Stokes scattering intensity and Raman peak red-shifting for GaP, Si and Gallium arsenide (GaAs) has been determined in the temperature range from 20 C to 140 C. The findings in this thesis can be used for further research on nanoscale enhanced stimulated Raman scattering to enable monolithically integrable Raman lasers."
    supervisor: "Alois Lugstein"